<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cherry Hills Missions - Touch to Start</title>
    <style>
        @font-face {
            font-family: 'Brandon Grotesque';
            src: url('assets/fonts/BrandonGrotesque-Bold.woff2') format('woff2'),
                 url('assets/fonts/BrandonGrotesque-Bold.woff') format('woff');
            font-weight: 600;
        }
        
        * {
            margin: 0;
            padding: 0;
            cursor: none;
        }

        /* Proportional root font-size so the screensaver renders the same
           physical size on the 75" 4K panel at any Windows display scaling.
           1rem ≈ 16.5px at a 3840px-wide viewport - larger than index.html's
           scale because this screen is viewed from across the room.
           Smaller divisor = bigger everything. */
        html {
            font-size: calc(100vw / 233);
        }

        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Brandon Grotesque', sans-serif;
        }
        
        /* Attract loop: mission photos crossfading behind the content.
           Hidden until missions.json and a first photo load, so the
           static screensaver is the offline fallback. */
        .photo-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        .photo-layer img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Anchor the crop to the top of the photo - faces are usually in
               the upper portion, so crop the bottom instead of the top. */
            object-position: center top;
            opacity: 0;
            transition: opacity 1.5s ease;
        }

        .photo-scrim {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 10, 30, 0.6);
            z-index: 0;
            display: none;
        }

        .mission-caption {
            position: fixed;
            bottom: 6rem;
            left: 7rem;
            z-index: 1;
            display: none;
        }

        .mission-caption .caption-name {
            font-size: 4.6rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 2px 1.5rem rgba(0, 0, 0, 0.8);
        }

        .mission-caption .caption-location {
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.85);
            margin-top: 0.8rem;
            text-shadow: 0 2px 1.5rem rgba(0, 0, 0, 0.8);
        }

        /* Keep the main content above the photo layers */
        .logo-container,
        .touch-text,
        .subtitle {
            position: relative;
            z-index: 1;
        }

        .logo-container {
            animation: float 6s ease-in-out infinite;
            margin-bottom: 6rem;
        }

        .logo {
            width: 48rem;
            height: 48rem;
            filter: drop-shadow(0 2rem 4rem rgba(0,0,0,0.5));
        }

        .touch-text {
            font-size: 6.4rem;
            color: #fff;
            font-weight: 600;
            letter-spacing: 0.3rem;
            animation: pulse 2s ease-in-out infinite;
            text-shadow: 0 0.4rem 2rem rgba(74, 144, 226, 0.5);
        }

        .subtitle {
            font-size: 3.2rem;
            color: #4A90E2;
            margin-top: 2.8rem;
            letter-spacing: 1px;
            opacity: 0.85;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-2rem); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
        
        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }
        
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(74, 144, 226, 0.1) 0%, transparent 70%);
            animation: rotate 30s linear infinite;
        }
        
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Touch Feedback for Screensaver */
        .touch-ripple {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(74, 144, 226, 0.8) 0%, rgba(74, 144, 226, 0.4) 40%, transparent 70%);
            transform: translate(-50%, -50%) scale(0);
            animation: screensaver-ripple 0.8s ease-out forwards;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes screensaver-ripple {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0;
            }
        }

        .touch-ring {
            position: fixed;
            width: 8rem;
            height: 8rem;
            border: 0.4rem solid rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            animation: touch-ring-expand 0.5s ease-out forwards;
            pointer-events: none;
            z-index: 1001;
        }

        @keyframes touch-ring-expand {
            0% {
                transform: translate(-50%, -50%) scale(0);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) scale(2);
                opacity: 0;
            }
        }

        /* Touch text feedback */
        .touch-text-active {
            animation: text-flash 0.3s ease-out;
        }

        @keyframes text-flash {
            0% { transform: scale(1); color: #fff; }
            50% { transform: scale(1.1); color: #4A90E2; }
            100% { transform: scale(1); color: #fff; }
        }
    </style>
    <script>
        // Auto-refresh functionality
        function setupAutoRefresh() {
            // Check if we have a stored refresh timestamp
            const lastRefresh = localStorage.getItem('lastRefreshTime');
            const now = Date.now();
            const twelveHours = 12 * 60 * 60 * 1000; // 12 hours in milliseconds
            
            if (!lastRefresh) {
                // First time load, store the current time
                localStorage.setItem('lastRefreshTime', now.toString());
            } else {
                const timeSinceRefresh = now - parseInt(lastRefresh);
                
                // If it's been more than 12 hours, refresh the page
                if (timeSinceRefresh >= twelveHours) {
                    localStorage.setItem('lastRefreshTime', now.toString());
                    window.location.reload(true); // Force reload from server
                    return; // Stop execution since page is reloading
                }
                
                // Calculate time until next refresh
                const timeUntilRefresh = twelveHours - timeSinceRefresh;
                
                // Set timeout for the remaining time
                setTimeout(() => {
                    localStorage.setItem('lastRefreshTime', Date.now().toString());
                    window.location.reload(true);
                }, timeUntilRefresh);
            }
            
            // Also set a recurring 12-hour interval as a backup
            setInterval(() => {
                localStorage.setItem('lastRefreshTime', Date.now().toString());
                window.location.reload(true);
            }, twelveHours);
        }
        
        // Setup auto-refresh when page loads
        window.addEventListener('load', setupAutoRefresh);
    </script>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="photo-layer">
        <img id="attract-img-1" src="" alt="">
        <img id="attract-img-2" src="" alt="">
    </div>
    <div class="photo-scrim" id="photo-scrim"></div>
    <div class="mission-caption" id="mission-caption">
        <div class="caption-name" id="caption-name"></div>
        <div class="caption-location" id="caption-location"></div>
    </div>
    <div class="logo-container">
        <img src="assets/logo.png" alt="Cherry Hills" class="logo" onerror="this.style.border='2px solid red'">
    </div>
    <h1 class="touch-text" id="touchText">TOUCH TO START</h1>
    <p class="subtitle">Explore Our Global Missions</p>

    <script>
        // ============================================
        // ATTRACT LOOP - crossfade mission photos
        // ============================================
        // Loads missions.json and cycles photos with name/location captions.
        // If the fetch or images fail (offline), the static logo screensaver
        // remains untouched.
        async function initAttractLoop() {
            let missions = [];
            try {
                const resp = await fetch('data/missions.json', { cache: 'no-cache' });
                if (resp.ok) missions = await resp.json();
            } catch (e) {
                return;
            }
            if (!Array.isArray(missions) || missions.length === 0) return;

            document.querySelector('.subtitle').textContent =
                `Explore Our ${missions.length} Mission Partners Around the World`;

            const withPhotos = missions.filter(m => m.image);
            if (withPhotos.length === 0) return;

            // Shuffle so the loop starts somewhere different each time
            for (let i = withPhotos.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [withPhotos[i], withPhotos[j]] = [withPhotos[j], withPhotos[i]];
            }

            const img1 = document.getElementById('attract-img-1');
            const img2 = document.getElementById('attract-img-2');
            let index = 0;
            let activeImg = 0; // 0 = none shown yet

            function showPhoto(i) {
                const m = withPhotos[i];
                const next = activeImg === 1 ? img2 : img1;
                const curr = activeImg === 1 ? img1 : img2;
                next.onload = function () {
                    next.style.opacity = 1;
                    if (curr !== next) curr.style.opacity = 0;
                    activeImg = next === img1 ? 1 : 2;
                    document.getElementById('photo-scrim').style.display = 'block';
                    const caption = document.getElementById('mission-caption');
                    caption.style.display = 'block';
                    document.getElementById('caption-name').textContent = m.name;
                    document.getElementById('caption-location').textContent = m.location || '';
                };
                // On failure do nothing - the next tick tries the next photo
                next.onerror = function () {};
                next.src = m.image;
            }

            showPhoto(0);
            setInterval(function () {
                index = (index + 1) % withPhotos.length;
                showPhoto(index);
            }, 8000);
        }

        initAttractLoop();

        // Touch feedback for screensaver
        function createTouchFeedback(x, y) {
            // Create ripple
            const ripple = document.createElement('div');
            ripple.className = 'touch-ripple';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.style.width = '40rem';
            ripple.style.height = '40rem';
            document.body.appendChild(ripple);

            // Create ring
            const ring = document.createElement('div');
            ring.className = 'touch-ring';
            ring.style.left = x + 'px';
            ring.style.top = y + 'px';
            document.body.appendChild(ring);

            // Animate text
            const touchText = document.getElementById('touchText');
            touchText.classList.add('touch-text-active');

            // Navigate after brief feedback delay
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 300);
        }

        // Handle both click and touch
        document.body.addEventListener('click', function(e) {
            createTouchFeedback(e.clientX, e.clientY);
        });

        document.body.addEventListener('touchstart', function(e) {
            if (e.touches && e.touches[0]) {
                const touch = e.touches[0];
                createTouchFeedback(touch.clientX, touch.clientY);
            }
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
